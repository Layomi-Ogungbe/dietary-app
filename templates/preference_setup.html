<!DOCTYPE html>
<html>
<head>
    <title>Setup Preferences</title>

    <style>
        body {
            font-family: 'Avenir', 'Georgia', sans-serif;
            background: #fffdf4;
        }
        .login-box {
            width: 450px;
            min-height: 550px;
            margin: 100px auto;
            display: flex;
            flex-direction: column;
            padding: 50px;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: rgba(218, 249, 227, 0.543);
            align-content: center;
        }
        
        .login-box h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #4c8753;
            font-size: 35px;
        }

        button {
            width: 100%;
            height : 40px;
            padding: 10px;
            margin-top: 10px;
            background: #4c8753;
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3a6f40;
        }

        .calorie-field {
            margin-top: 8px;
            background-color: #ffffffba;
            width: 100%;
            padding: 4px 0;
            padding-left: 8px;
            text-align: right;
            border: none;
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .calorie-field:focus {
            outline: none;
            border-bottom-color: #464545; 
            
        }

        .select-wrapper {
            position: relative;
            width: 80%;
        }

        .select-display {
            width: 100%;
            padding: 8px;
            border: none;
            border-bottom: 1px solid #ccc;
            font-size: 13px;
            font-style: italic;
            color: gray;
            cursor: pointer;
            background: transparent;
        }

        .select-dropdown {
            display: none;
            position: absolute;
            top: 32px;
            left: 0;
            width: 110%;
            max-height: 150px;
            overflow-y: auto;
            border: none;
            background: white;
            z-index: 999;
        }

        .select-wrapper:focus-within .select-dropdown {
            display: block;
        }

        .select-dropdown option {
            padding: 6px;
        }

        .preference-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 40px;
        }

        .calorie-box{
           margin-top: 2px;
           width : 80%;
        }

        .login-box p {
            font-size: 14px;
            color: #464545;
            margin-bottom: 50px;
            line-height: 1.4;
            text-align: justify;
        }






    </style>
</head>
<body>

    <div class="login-box">
        <h1>Choose your Preferences</h1>

        <p>Please set your dietary preferences below to help us tailor meal suggestions to your needs. Don't worry these can always be changed later.</p>

        <form method="POST" action="/setup-preferences">

            <div class="preference-box">
                <div class ="calorie-box">
                    <label>Calorie Target</label>
                    <input type="number" name="calorie_target" class="calorie-field" value="{{ suggested_calories }}" required>
                </div>
                

                

                <div class="select-wrapper" tabindex="0">
                    
                    <label>Preferred Tags</label>
                    <div class="select-display">Select one or more…</div>

                    <select name="preferred_tags" multiple class="select-dropdown">
                        <option value="indian">Indian</option>
                        <option value="italian">Italian</option>
                        <option value="asian">Asian</option>
                        <option value="american">American</option>
                        <option value="japanese">Japanese</option>
                        <option value="mexican">Mexican</option>
                        <option value="middle-eastern">Middle Eastern</option>
                        <option value="british">British</option>

                        <option value="high-protein">High Protein</option>
                        <option value="low-fat">Low Fat</option>
                        <option value="low-calorie">Low Calorie</option>
                        <option value="high-sugar">High Sugar</option>
                        <option value="high-fiber">High Fiber</option>
                        <option value="healthy">Healthy</option>
                        <option value="fried">Fried</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="spicy">Spicy</option>
                        <option value="breakfast">Breakfast</option>
                    </select>
                </div>


                
                <div class="select-wrapper" tabindex="0">
                    <label>Disliked Tags</label>
                    <div class="select-display">Select one or more…</div>
                        <select name="disliked_tags" multiple class="select-dropdown">
                            <option value="indian">Indian</option>
                            <option value="italian">Italian</option>
                            <option value="asian">Asian</option>
                            <option value="american">American</option>
                            <option value="japanese">Japanese</option>
                            <option value="mexican">Mexican</option>
                            <option value="middle-eastern">Middle Eastern</option>
                            <option value="british">British</option>

                            <option value="high-protein">High Protein</option>
                            <option value="low-fat">Low Fat</option>
                            <option value="low-calorie">Low Calorie</option>
                            <option value="high-sugar">High Sugar</option>
                            <option value="high-fiber">High Fiber</option>
                            <option value="healthy">Healthy</option>
                            <option value="fried">Fried</option>
                            <option value="vegetarian">Vegetarian</option>
                            <option value="spicy">Spicy</option>
                            <option value="breakfast">Breakfast</option>
                        </select>
                </div>

                
                <div class="select-wrapper" tabindex="0">
                    <label>Allergens</label>
                    <div class="select-display">Select one or more…</div>
                    <select name="allergens" multiple class="select-dropdown">
                        <option value="Celery">Celery</option>
                        <option value="Gluten">Gluten</option>
                        <option value="Crustaceans">Crustaceans</option>
                        <option value="Eggs">Eggs</option>
                        <option value="Fish">Fish</option>
                        <option value="Lupin">Lupin</option>
                        <option value="Milk">Milk</option>
                        <option value="Molluscs">Molluscs</option>
                        <option value="Mustard">Mustard</option>
                        <option value="Tree nuts">Tree nuts</option>
                        <option value="Peanuts">Peanuts</option>
                        <option value="Sesame">Sesame</option>
                        <option value="Soya">Soya</option>
                        <option value="Sulphites">Sulphites</option>
                    </select>
                </div>
            </div>
            <button type="submit">Save Preferences</button>
        </form>

    </div>

</body>
</html>
